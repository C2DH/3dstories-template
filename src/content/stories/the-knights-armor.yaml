title:
  en: The Knight's Armor
  fr: L'Armure du Chevalier

excerpt:
  en: Explore the intricate details of a medieval knight's armor and discover its history.
  fr: Explorez les détails complexes d'une armure de chevalier médiéval et découvrez son histoire.

content:
  en: This story takes you on a journey through the craftsmanship and history behind a knight's armor, from the forge to the battlefield.
  fr: Cette histoire vous emmène dans un voyage à travers le savoir-faire et l'histoire d'une armure de chevalier, de la forge au champ de bataille.

