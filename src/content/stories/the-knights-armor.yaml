sections:
  - id: the-knights-armor
    title:
      en: The Knight's Armor
      fr: L'Armure du Chevalier
    content:
      en: A knight's armor was a marvel of medieval engineering, protecting its wearer while allowing freedom of movement.
      fr: L'armure d'un chevalier était une merveille de l'ingénierie médiévale, protégeant son porteur tout en lui permettant une liberté de mouvement.
  - id: the-knights-armor-section-2
    title:
      en: The Craft of Armor Making
      fr: L'Art de la Fabrication d'Armures
    content:
      en: Skilled armorers spent months crafting each piece, fitting the armor precisely to the knight who would wear it into battle.
      fr: Des armuriers qualifiés passaient des mois à fabriquer chaque pièce, ajustant l'armure avec précision au chevalier qui la porterait au combat.
