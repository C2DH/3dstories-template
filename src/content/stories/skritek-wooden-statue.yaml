title:
  en: Skřítek - Wooden Statue
  fr: Skřítek - Statue en Bois

excerpt:
  en: Discover the story behind this intricately carved wooden statue known as Skřítek.
  fr: Découvrez l'histoire derrière cette statue en bois finement sculptée connue sous le nom de Skřítek.

content:
  en: This story explores the origins and craftsmanship of a wooden statue called Skřítek, a figure rooted in Central European folk tradition.
  fr: Cette histoire explore les origines et le savoir-faire d'une statue en bois appelée Skřítek, une figure ancrée dans la tradition folklorique d'Europe centrale.

